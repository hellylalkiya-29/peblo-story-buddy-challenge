name: peblo_story_buddy
description: "Peblo AI Story Buddy & Quiz Component"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Audio
  flutter_tts: ^4.0.2
  
  # Animations & UI
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Agar aapne koi image ya assets folder banaya hai
  assets:
    - assets/images/